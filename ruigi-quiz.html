<script>
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function randomStars(n){return Array.from({length:n},()=>["⭐","🌟","✨"][randInt(0,2)]).join(" ");}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── 問題バンク ──────────────────────────────────────────────

// 対義語 [語A, 語B, 解説]  ※AとBは対義語

  ["権利","義務","やる権利があることとやらなければならないことの反対。"],

// 類義語から不正解候補を作るときに使う語のプール
const RUIGI_POOL = [
  "感動","用意","返事","結果","仲間","景色","価格","質問",
  "知恵","完成","権利","性質","改める","断る","集める","増える",
  "驚く","許す","助ける","探す","急ぐ","消える","似ている","正確な",
  "希望","成功","賛成","原因","勝利","出発","集合","真実","個人",
];

const TAIGI_POOL = [
  "結果","失敗","反対","到着","輸出","農村","祖先","退歩","虚偽",
  "抽象","集団","終了","縮小","減少","後退","消費","文明","戦争",
  "束縛","不公平","消極","短所","悲しみ","受け取る","弛緩","破壊",
  "否定","下降","曖昧","不要","形式","理想","特殊","総合","義務",

</script>
<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "ruigi_best_streak";
const QUIZ_KEY = "rv_ruigi";
const Q_OPTIONS = [5, 10, 15, 20];
const BTN = "linear-gradient(135deg,#a855f7,#7c3aed)";

function pickProblems(diff, total) {
  let pool = [];

  if (diff === "ruigi_find" || diff === "mix") {
    // 問題形式A: 語Aの類義語を4択で選ぶ
    RUIGI_BANK.forEach(([wordA, wordB, exp]) => {
      if (wordA === wordB) return; // placeholderスキップ
      // wordAの類義語=wordB。不正解はRUIGI_POOLから
      const wrongs = shuffle(RUIGI_POOL.filter(w => w !== wordB && w !== wordA)).slice(0, 3);
      const opts = shuffle([wordB, ...wrongs]);
      pool.push({
        color:"#7c3aed", title:"類義語を選ぼう",
        word: wordA, sentence: null,
        question:`「${wordA}」の類義語（似た意味の語）はどれですか？`,
        options: opts, answer: opts.indexOf(wordB),
        explanation:`「${wordA}」の類義語は「${wordB}」\n${exp}`,
      });
    });
  }

  if (diff === "taigi_find" || diff === "mix") {
    // 問題形式B: 語Aの対義語を4択で選ぶ
    TAIGI_BANK.forEach(([wordA, wordB, exp]) => {
      const wrongs = shuffle(TAIGI_POOL.filter(w => w !== wordB && w !== wordA)).slice(0, 3);
      const opts = shuffle([wordB, ...wrongs]);
      pool.push({
        color:"#be185d", title:"対義語を選ぼう",
        word: wordA, sentence: null,
        question:`「${wordA}」の対義語（反対の意味の語）はどれですか？`,
        options: opts, answer: opts.indexOf(wordB),
        explanation:`「${wordA}」の対義語は「${wordB}」\n${exp}`,
      });
    });
  }

  if (diff === "ruigi_rev" || diff === "mix") {
    // 問題形式C: 逆方向（語Bから語Aを当てる）
    RUIGI_BANK.forEach(([wordA, wordB, exp]) => {
      if (wordA === wordB) return;
      const wrongs = shuffle(RUIGI_POOL.filter(w => w !== wordA && w !== wordB)).slice(0, 3);
      const opts = shuffle([wordA, ...wrongs]);
      pool.push({
        color:"#6d28d9", title:"類義語を選ぼう",
        word: wordB, sentence: null,
        question:`「${wordB}」の類義語はどれですか？`,
        options: opts, answer: opts.indexOf(wordA),
        explanation:`「${wordB}」の類義語は「${wordA}」\n${exp}`,
      });
    });
  }

  if (diff === "taigi_rev" || diff === "mix") {
    // 問題形式D: 逆方向（語Bから語Aを当てる）
    TAIGI_BANK.forEach(([wordA, wordB, exp]) => {
      const wrongs = shuffle(TAIGI_POOL.filter(w => w !== wordA && w !== wordB)).slice(0, 3);
      const opts = shuffle([wordA, ...wrongs]);
      pool.push({
        color:"#9d174d", title:"対義語を選ぼう",
        word: wordB, sentence: null,
        question:`「${wordB}」の対義語はどれですか？`,
        options: opts, answer: opts.indexOf(wordA),
        explanation:`「${wordB}」の対義語は「${wordA}」\n${exp}`,
      });
    });
  }

  const shuffled = shuffle(pool);
  const result = [];
  const used = new Set();
  while (result.length < total) {
    const idx = Math.floor(Math.random() * shuffled.length);
    if (!used.has(idx) || shuffled.length < total) {
      used.add(idx);
      result.push({...shuffled[idx]});
    }
  }
  return result;
}

function SelectAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="select-grid">
      {problem.options.map((opt, i) => {
        let cls = "select-btn";
        if (checked) {
          if (i === problem.answer) cls += " show-correct";
          else if (i === userAnswer) cls += " wrong";
        }
        return (
          <button key={i} className={cls} onClick={() => !checked && onAnswer(i)}>
            <span style={{color:"#6b7280",marginRight:"8px",fontWeight:"normal"}}>{"①②③④"[i]}</span>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [mode,setMode]         = useState("setup");
  const [reviewBank,setReviewBank] = useState([]);
  const [diff,setDiff]         = useState("mix");
  const [totalQ,setTotalQ]     = useState(10);
  const [problems,setProblems] = useState([]);
  const [current,setCurrent]   = useState(0);
  const [score,setScore]       = useState(0);
  const [streak,setStreak]     = useState(0);
  const [best,setBest]         = useState(0);
  const [checked,setChecked]   = useState(false);
  const [userAnswer,setUserAnswer] = useState(null);
  const [celeb,setCeleb]       = useState(false);
  const [isCorrect,setIsCorrect] = useState(false);

  useEffect(() => {
    try { const s=localStorage.getItem(STORAGE_KEY); if(s) setBest(parseInt(s)||0); } catch(_) {}
    setReviewBank(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));
  }, []);
  const saveBest = v => { try { localStorage.setItem(STORAGE_KEY, String(v)); } catch(_) {} };

  const startReview = () => {
    const bank = JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
    setReviewBank(bank);
    if (bank.length === 0) { setMode("setup"); return; }
    const reshuffled = bank.map(p => {
      const correctOpt = p.options[p.answer];
      const opts = shuffle([...p.options]);
      return {...p, options: opts, answer: opts.indexOf(correctOpt)};
    });
    setProblems(reshuffled);
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setCeleb(false);
    setMode("review");
  };

  const startQuiz = () => {
    setProblems(pickProblems(diff, totalQ));
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setCeleb(false);
    setMode("quiz");
  };

  const problem = problems[current] || null;

  const handleAnswer = ans => {
    if (checked) return;
    setUserAnswer(ans); setChecked(true);
    const ok = ans === problem.answer;
    setIsCorrect(ok);
    if (ok) {
      setScore(s => s+1); const ns = streak+1; setStreak(ns);
      if (ns > best) { setBest(ns); saveBest(ns); }
      setCeleb(true); setTimeout(() => setCeleb(false), 1800);
      try {
        const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
        const id=(problem.title||'')+'|'+(problem.question||'');
        const i=b.findIndex(x=>x._id===id);
        if(i>=0){b[i].ok=(b[i].ok||0)+1;if(b[i].ok>=5)b.splice(i,1);localStorage.setItem(QUIZ_KEY,JSON.stringify(b));}
        setReviewBank([...b]);
      } catch(_) {}
    } else {
      setStreak(0);
      try {
        const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
        const id=(problem.title||'')+'|'+(problem.question||'');
        if(!b.find(x=>x._id===id)){const s={...problem,_id:id,ok:0};b.push(s);localStorage.setItem(QUIZ_KEY,JSON.stringify(b));}
        setReviewBank([...b]);
      } catch(_) {}
    }
  };

  const nextQuestion = () => {
    const _end = current+1 >= problems.length;
    if (_end && mode==="review") {
      const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
      setReviewBank([...b]);
      if(b.length>0){startReview();}else{setMode("graduated");}
      return;
    }
    if (_end) { setMode("result"); return; }
    setCurrent(c => c+1);
    setChecked(false); setUserAnswer(null); setCeleb(false);
  };

  const progress = problem ? (current/problems.length)*100 : 0;

  const DIFF_OPTIONS = [
    {key:"ruigi_find", emoji:"🔵", name:"類義語を探す",       desc:"語Aの類義語（似た意味）を4択で選ぶ"},
    {key:"ruigi_rev",  emoji:"🔷", name:"類義語（逆引き）",   desc:"語Bから語Aの類義語を探す"},
    {key:"taigi_find", emoji:"🔴", name:"対義語を探す",       desc:"語Aの対義語（反対の意味）を4択で選ぶ"},
    {key:"taigi_rev",  emoji:"🔶", name:"対義語（逆引き）",   desc:"語Bから語Aの対義語を探す"},
    {key:"mix",        emoji:"⭐", name:"ミックス",           desc:"類義語・対義語の全タイプからランダム出題"},
  ];

  if (mode === "graduated") return (
    <div className="setup-wrap" style={{background:"#fdf2f8"}}>
      <div className="setup-card">
        <div className="setup-emoji">{"🎓"}</div>
        <h2 className="setup-title" style={{color:"#701a75"}}>{"復習バンク卒業！"}</h2>
        <p style={{fontSize:"14px",color:"#a21caf",marginBottom:"16px",fontWeight:"bold"}}>{"すべての問題を5回正解しました！"}</p>
        <div style={{background:"#fae8ff",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#701a75",lineHeight:"1.8"}}>{"🌟 間違えた問題をすべてマスターしました！"}</div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #6b21a8"}} onClick={()=>setMode("setup")}>{"もどる"}</button>
      </div>
    </div>
  );

  if (mode === "setup") return (
    <div className="setup-wrap" style={{background:"#fdf2f8"}}>
      <div className="setup-card">
        <div style={{textAlign:"center",marginBottom:"12px",fontSize:"12px"}}>
          <a href="https://shoi141.github.io/kokugo-quiz/" style={{color:"#adb5bd",textDecoration:"none"}}>← 国語トップ</a>
          {"　|　"}
          <a href="https://shoi141.github.io/quiz-portal/" style={{color:"#adb5bd",textDecoration:"none"}}>🏠 教科トップ</a>
        </div>
        <div className="setup-emoji">📖</div>
        <h1 className="setup-title" style={{color:"#701a75"}}>類義語・対義語クイズ</h1>
        <p className="setup-sub">中学入試頻出の語句を身につけよう</p>
        <div style={{marginBottom:"16px"}}>
          <button onClick={()=>{if(reviewBank.length>0)startReview();}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",
              background:reviewBank.length>0?"#fef2f2":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>{"📚 復習モード"}</div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>{"タップして今すぐ開始！"}</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?reviewBank.length+"問":"なし"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>{"間違えた問題が溜まるとここで復習できます"}</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"#fae8ff",border:"1.5px solid #d946ef",color:"#701a75"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">分野を選ぶ</div>
        <div className="diff-btn-row">
          {DIFF_OPTIONS.map(d => (
            <button key={d.key} className="diff-card-btn"
              style={{background:diff===d.key?"#fae8ff":"#f9fafb",
                      border:diff===d.key?"2px solid #a855f7":"2px solid #e5e7eb",
                      boxShadow:diff===d.key?"0 3px 0 #a855f7":"none"}}
              onClick={()=>setDiff(d.key)}>
              <span style={{fontSize:"22px"}}>{d.emoji}</span>
              <div>
                <div className="diff-name" style={{color:diff===d.key?"#701a75":"#1f2937"}}>{d.name}</div>
                <div className="diff-desc">{d.desc}</div>
              </div>
              {diff===d.key&&<span style={{marginLeft:"auto",fontSize:"18px"}}>✅</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n => (
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #a855f7":"2px solid #dee2e6",
                      background:totalQ===n?"#a855f7":"#f8f9fa",
                      color:totalQ===n?"#fff":"#495057",
                      boxShadow:totalQ===n?"0 3px 0 #7c3aed":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #6b21a8"}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );

  if (mode === "result") {
    const pct = Math.round((score/problems.length)*100);
    return (
      <div className="setup-wrap" style={{background:"#fdf2f8"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#701a75"}}>おわり！</h2>
          <p className="result-score">{problems.length}問中 <span className="result-big" style={{color:"#a855f7"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#fae8ff"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #6b21a8"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn"
              style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",
                boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={startReview}>{"続けて復習する 📚 ("}{reviewBank.length}{"問)"}</button>
          )}
        </div>
      </div>
    );
  }

  if (!problem) return null;

  const isRuigi = problem.title.includes("類義");
  const labelText = isRuigi ? "類義語（似た意味）" : "対義語（反対の意味）";

  return (
    <div className="rika-root">
      {celeb && (
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#701a75"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#a855f7"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}
      <div className="quiz-header">
        <button className="back-btn" onClick={()=>setMode("setup")}>← もどる</button>
        <span className="q-label">Q{current+1}<span className="q-total">/{problems.length}</span></span>
        <span className="streak-badge">🔥{streak}</span>
      </div>
      <div className="progress-bar-bg">
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        <div style={{fontWeight:"900",fontSize:"12px",color:problem.color,marginBottom:"6px"}}>{problem.title}</div>
        <div className="word-display">{problem.word}</div>
        <div className="arrow-display">↕️</div>
        <div className="question-label">{labelText}はどれですか？</div>
        <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>
      </div>
      {checked && (
        <>
          <div style={{textAlign:"center",fontSize:"18px",fontWeight:"900",color:isCorrect?"#10b981":"#ef4444"}}>
            {isCorrect?"⭕ 正解！":"❌ 不正解"}
          </div>
          <div className="explanation-card">
            <div style={{fontWeight:"900",marginBottom:"4px",fontSize:"12px",color:"#92400e"}}>💡 解説</div>
            {problem.explanation.split("\n").map((line,i) => <div key={i}>{line}</div>)}
          </div>
          <button className="next-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #6b21a8"}} onClick={nextQuestion}>
            {current+1>=problems.length?"結果を見る 🎉":"つぎへ →"}
          </button>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
