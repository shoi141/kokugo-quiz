<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "kotowaza_best";
const QUIZ_KEY = "rv_kotowaza";
const Q_OPTIONS = [5, 10, 15, 20];
const BTN = "linear-gradient(135deg,#581c87,#3b0764)";
const BANKS={mix:{bank:KOTOWAZA_BANK,color:"#581c87",title:"гҒ“гҒЁгӮҸгҒ–гғ»ж…Јз”ЁеҸҘ"}};
function pickProblems(diff, total) {
  let pool = [];
  const targets = diff === "mix" ? Object.values(BANKS) : [BANKS[diff]];
  targets.forEach(({ bank, color, title }) => {
    bank.forEach(([q, ans, wrongs, exp]) => {
      const opts = shuffle([ans, ...wrongs.slice(0,3)]);
      pool.push({ color, title, question:q, options:opts, answer:opts.indexOf(ans),
        explanation:`гҖҗжӯЈи§ЈгҖ‘${ans}
${exp}` });
    });
  });
  const shuffled = shuffle(pool);
  const result=[]; const used=new Set();
  while(result.length<total){
    const idx=Math.floor(Math.random()*shuffled.length);
    if(!used.has(idx)||shuffled.length<total){used.add(idx);result.push({...shuffled[idx]});}
  }
  return result;
}
function SelectAnswer({problem,checked,userAnswer,onAnswer}){
  return(<div className="select-grid">{problem.options.map((opt,i)=>{
    let cls="select-btn";
    if(checked){if(i===problem.answer)cls+=" show-correct";else if(i===userAnswer)cls+=" wrong";}
    return(<button key={i} className={cls} onClick={()=>!checked&&onAnswer(i)}>
      <span style={{color:"#6b7280",marginRight:"8px",fontWeight:"normal"}}>{"в‘ в‘Ўв‘ўв‘Ј"[i]}</span>{opt}
    </button>);
  })}</div>);
}
function App(){
  const [mode,setMode]=useState("setup");
  const [reviewBank,setReviewBank]=useState([]);
  const [diff,setDiff]=useState("mix");
  const [totalQ,setTotalQ]=useState(10);
  const [problems,setProblems]=useState([]);
  const [current,setCurrent]=useState(0);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [best,setBest]=useState(0);
  const [checked,setChecked]=useState(false);
  const [userAnswer,setUserAnswer]=useState(null);
  const [celeb,setCeleb]=useState(false);
  const [isCorrect,setIsCorrect]=useState(false);
  useEffect(()=>{
    try{const s=localStorage.getItem("kotowaza_best");if(s)setBest(parseInt(s)||0);}catch(_){}
    setReviewBank(JSON.parse(localStorage.getItem("rv_kotowaza")||'[]'));
  },[]);
  const saveBest=v=>{try{localStorage.setItem("kotowaza_best",String(v));}catch(_){}};
  const startReview=()=>{
    const bank=JSON.parse(localStorage.getItem("rv_kotowaza")||'[]');
    setReviewBank(bank);
    if(bank.length===0){setMode("setup");return;}
    const r=bank.map(p=>{const c=p.options[p.answer];const opts=shuffle([...p.options]);return{...p,options:opts,answer:opts.indexOf(c)};});
    setProblems(r);setCurrent(0);setScore(0);setStreak(0);setChecked(false);setUserAnswer(null);setCeleb(false);setMode("review");
  };
  const startQuiz=()=>{
    setProblems(pickProblems(diff,totalQ));setCurrent(0);setScore(0);setStreak(0);
    setChecked(false);setUserAnswer(null);setCeleb(false);setMode("quiz");
  };
  const problem=problems[current]||null;
  const handleAnswer=ans=>{
    if(checked)return;
    setUserAnswer(ans);setChecked(true);
    const ok=ans===problem.answer;setIsCorrect(ok);
    if(ok){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),1800);
      try{const b=JSON.parse(localStorage.getItem("rv_kotowaza")||'[]');const id=problem.title+'|'+problem.question;const i=b.findIndex(x=>x._id===id);if(i>=0){b[i].ok=(b[i].ok||0)+1;if(b[i].ok>=5)b.splice(i,1);localStorage.setItem("rv_kotowaza",JSON.stringify(b));}setReviewBank([...b]);}catch(_){}
    }else{
      setStreak(0);
      try{const b=JSON.parse(localStorage.getItem("rv_kotowaza")||'[]');const id=problem.title+'|'+problem.question;if(!b.find(x=>x._id===id)){const s={...problem,_id:id,ok:0};b.push(s);localStorage.setItem("rv_kotowaza",JSON.stringify(b));}setReviewBank([...b]);}catch(_){}
    }
  };
  const nextQuestion=()=>{
    const _end=current+1>=problems.length;
    if(_end&&mode==="review"){const b=JSON.parse(localStorage.getItem("rv_kotowaza")||'[]');setReviewBank([...b]);if(b.length>0){startReview();}else{setMode("graduated");}return;}
    if(_end){setMode("result");return;}
    setCurrent(c=>c+1);setChecked(false);setUserAnswer(null);setCeleb(false);
  };
  const progress=problem?(current/problems.length)*100:0;
  const DIFF_OPTIONS=[{key:"mix",emoji:"рҹ“–",name:"е…Ёе•ҸгғҹгғғгӮҜгӮ№",desc:"гҒ“гҒЁгӮҸгҒ–гғ»ж…Јз”ЁеҸҘгғ»еӣӣеӯ—зҶҹиӘһгӮ’гғ©гғігғҖгғ еҮәйЎҢ"}];
  if(mode==="graduated")return(<div className="setup-wrap" style={{background:"#faf5ff"}}><div className="setup-card"><div className="setup-emoji">рҹҺ“</div><h2 className="setup-title" style={{color:"#3b0764"}}> еҫ©зҝ’гғҗгғігӮҜеҚ’жҘӯпјҒ</h2><div style={{background:"#f3e8ff",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#3b0764",lineHeight:"1.8"}}>рҹҢҹ гғһгӮ№гӮҝгғјйҒ”жҲҗпјҒ</div><button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #3b0764"}} onClick={()=>setMode("setup")}>гӮӮгҒ©гӮӢ</button></div></div>);
  if(mode==="setup")return(
    <div className="setup-wrap" style={{background:"#faf5ff"}}>
      <div className="setup-card">
        <div style={{textAlign:"center",marginBottom:"12px",fontSize:"12px"}}>
          <a href="https://shoi141.github.io/kokugo-quiz/" style={{color:"#adb5bd",textDecoration:"none"}}>вҶҗ еӣҪиӘһгғҲгғғгғ—</a>
          {"гҖҖ|гҖҖ"}
          <a href="https://shoi141.github.io/quiz-portal/" style={{color:"#adb5bd",textDecoration:"none"}}>рҹҸ  ж•ҷз§‘гғҲгғғгғ—</a>
        </div>
        <div className="setup-emoji">рҹ“–</div>
        <h1 className="setup-title" style={{color:"#3b0764"}}>гҒ“гҒЁгӮҸгҒ–гғ»ж…Јз”ЁеҸҘгӮҜгӮӨгӮә</h1>
        <p className="setup-sub">гӮҲгҒҸеҮәгӮӢгҒ“гҒЁгӮҸгҒ–гғ»ж…Јз”ЁеҸҘгӮ’иҰҡгҒҲгӮҲгҒҶпјҒ</p>
        <div style={{marginBottom:"16px"}}>
          <button onClick={()=>{if(reviewBank.length>0)startReview();}} style={{width:"100%",padding:"14px 16px",borderRadius:"14px",cursor:reviewBank.length>0?"pointer":"default",border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",background:reviewBank.length>0?"#fef2f2":"#f9fafb",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}><div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>рҹ“ҡ еҫ©зҝ’гғўгғјгғү</div>{reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>гӮҝгғғгғ—гҒ—гҒҰд»ҠгҒҷгҒҗй–Ӣе§ӢпјҒ</div>}</div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>{reviewBank.length>0?reviewBank.length+"е•Ҹ":"гҒӘгҒ—"}</span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>й–“йҒ•гҒҲгҒҹе•ҸйЎҢгҒҢжәңгҒҫгӮӢгҒЁгҒ“гҒ“гҒ§еҫ©зҝ’гҒ§гҒҚгҒҫгҒҷ</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"#f3e8ff",border:"1.5px solid #581c87",color:"#3b0764"}}>рҹҸҶ жңҖй«ҳйҖЈз¶ҡиЁҳйҢІпјҡ<strong>{best}е•Ҹ</strong></div>}
        <div className="qcount-section">еҲҶйҮҺгӮ’йҒёгҒ¶</div>
        <div className="diff-btn-row">
          {DIFF_OPTIONS.map(d=>(
            <button key={d.key} className="diff-card-btn" style={{background:diff===d.key?"#f3e8ff":"#f9fafb",border:diff===d.key?"2px solid #581c87":"2px solid #e5e7eb",boxShadow:diff===d.key?"0 3px 0 #581c87":"none"}} onClick={()=>setDiff(d.key)}>
              <span style={{fontSize:"22px"}}>{d.emoji}</span>
              <div><div className="diff-name" style={{color:diff===d.key?"#3b0764":"#1f2937"}}>{d.name}</div><div className="diff-desc">{d.desc}</div></div>
              {diff===d.key&&<span style={{marginLeft:"auto",fontSize:"18px"}}>вң…</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">дҪ•е•ҸгӮ„гӮӢпјҹ</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(<button key={n} className="qcount-btn" style={{border:totalQ===n?"2px solid #581c87":"2px solid #dee2e6",background:totalQ===n?"#581c87":"#f8f9fa",color:totalQ===n?"#fff":"#495057",boxShadow:totalQ===n?"0 3px 0 #3b0764":"none"}} onClick={()=>setTotalQ(n)}>{n}е•Ҹ</button>))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #3b0764"}} onClick={startQuiz}>гӮ№гӮҝгғјгғҲпјҒ рҹҡҖ</button>
      </div>
    </div>
  );
  if(mode==="result"){
    const pct=Math.round((score/problems.length)*100);
    return(<div className="setup-wrap" style={{background:"#faf5ff"}}><div className="setup-card">
      <div className="setup-emoji">{pct===100?"рҹҸҶ":pct>=70?"рҹҺү":"рҹ’Ә"}</div>
      <h2 className="setup-title" style={{color:"#3b0764"}}> гҒҠгӮҸгӮҠпјҒ</h2>
      <p className="result-score">{problems.length}е•Ҹдёӯ <span className="result-big" style={{color:"#581c87"}}>{score}</span> е•ҸжӯЈи§Ј</p>
      <div className="pct-bar-bg" style={{background:"#f3e8ff"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
      <p className="pct-text">{pct}%</p>
      <div className="streak-result-row">
        <div className="streak-result-box"><div className="streak-result-label">гҒ“гҒ®еӣһгҒ®жңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{color:"#ef4444"}}>рҹ”Ҙ {streak}е•Ҹ</div></div>
        <div className="streak-result-box"><div className="streak-result-label">жӯҙд»ЈжңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{color:"#f59f00"}}>рҹҸҶ {best}е•Ҹ</div></div>
      </div>
      <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #3b0764"}} onClick={startQuiz}>гӮӮгҒҶдёҖеәҰ</button>
        <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>иЁӯе®ҡгҒё</button>
      </div>
      {reviewBank.length>0&&<button className="start-btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}} onClick={startReview}>з¶ҡгҒ‘гҒҰеҫ©зҝ’гҒҷгӮӢ рҹ“ҡ ({reviewBank.length}е•Ҹ)</button>}
    </div></div>);
  }
  if(!problem)return null;
  return(
    <div className="rika-root">
      {celeb&&(<div className="celeb-overlay"><div className="celeb-box">
        <div className="celeb-emoji">рҹҺү</div>
        <div className="celeb-text" style={{color:"#3b0764"}} >гҒӣгҒ„гҒӢгҒ„пјҒ</div>
        <div className="celeb-stars">{randomStars(5)}</div>
        {streak>=3&&<div className="celeb-streak" style={{background:"#581c87"}} >рҹ”Ҙ {streak}гӮҢгӮ“гҒһгҒҸпјҒ</div>}
        {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>рҹҸҶ ж–°иЁҳйҢІпјҒ</div>}
      </div></div>)}
      <div className="quiz-header">
        <button className="back-btn" onClick={()=>setMode("setup")}>вҶҗ гӮӮгҒ©гӮӢ</button>
        <span className="q-label">Q{current+1}<span className="q-total">/{problems.length}</span></span>
        <span className="streak-badge">рҹ”Ҙ{streak}</span>
      </div>
      <div className="progress-bar-bg"><div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/></div>
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        <div style={{fontWeight:"900",fontSize:"12px",color:problem.color,marginBottom:"8px"}}>{problem.title}</div>
        <div style={{fontSize:"16px",fontWeight:"bold",lineHeight:"1.8",marginBottom:"14px"}}>{problem.question}</div>
        <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>
      </div>
      {checked&&(<>
        <div style={{textAlign:"center",fontSize:"18px",fontWeight:"900",color:isCorrect?"#10b981":"#ef4444"}}>{isCorrect?"вӯ• жӯЈи§ЈпјҒ":"вқҢ дёҚжӯЈи§Ј"}</div>
        <div className="explanation-card">
          <div style={{fontWeight:"900",marginBottom:"4px",fontSize:"12px",color:"#92400e"}}>рҹ’Ў и§ЈиӘ¬</div>
          {problem.explanation.split("\n").map((line,i)=><div key={i}>{line}</div>)}
        </div>
        <button className="next-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #3b0764"}} onClick={nextQuestion}>{current+1>=problems.length?"зөҗжһңгӮ’иҰӢгӮӢ рҹҺү":"гҒӨгҒҺгҒё вҶ’"}</button>
      </>)}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
