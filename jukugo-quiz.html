<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二字熟語 国語クイズ</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="rika-common.js"></script>
<style>
  body { background: #fdf2f8; }
  .rika-root {
    min-height: 100vh; background: #fdf2f8;
    padding: 12px; max-width: 480px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .select-grid { display: flex; flex-direction: column; gap: 8px; }
  .select-btn {
    width: 100%; padding: 14px 16px;
    border: 2px solid #e5e7eb; border-radius: 14px;
    background: #fff; cursor: pointer;
    font-size: 14px; font-weight: bold; text-align: left;
    font-family: inherit; box-shadow: 0 2px 0 #e5e7eb;
  }
  .select-btn.correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .select-btn.wrong   { background: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.7; }
  .select-btn.show-correct { background: #d1fae5; border-color: #10b981; color: #065f46; }
  .explanation-card {
    background: #fef3c7; border: 1.5px solid #f59e0b;
    border-radius: 12px; padding: 12px 14px;
    font-size: 13px; color: #78350f; line-height: 1.8;
  }
  .diff-badge {
    font-size: 10px; font-weight: bold;
    padding: 2px 8px; border-radius: 99px; margin-left: 6px;
  }
  .diff-shogaku { background: #dcfce7; color: #166534; }
  .diff-nyushi  { background: #fef3c7; color: #92400e; }
  .diff-btn-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .diff-card-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 14px;
    cursor: pointer; text-align: left; border: 2px solid transparent;
    font-family: inherit; background: #f9fafb;
  }
  .diff-card-btn .diff-name { font-weight: 900; font-size: 15px; }
  .diff-card-btn .diff-desc { font-size: 11px; color: #6b7280; margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "jukugo_best_streak";
const Q_OPTIONS = [5, 10, 15, 20];

// ─── 問題バンク ────────────────────────────────────────────
// 組み立てタイプ定義
const TYPES = {
  A: "似た意味の漢字の組み合わせ",
  B: "反対（対の）意味の漢字の組み合わせ",
  C: "上の漢字が下の漢字を修飾（説明）する",

  F: "上の漢字が下の漢字を打ち消す（不・無・非・未）",
};

// [熟語, 読み, タイプ, 解説]
const PROBLEMS_STRUCTURE = [
  // A: 似た意味

  ["優劣", "ゆうれつ", "B", "「優」はすぐれる、「劣」はおとる。反対の意味。"],
  ["去来", "きょらい", "B", "「去」はさる、「来」はくる。反対の意味。"],
  ["強弱", "きょうじゃく","B","「強」は強い、「弱」は弱い。反対の意味。"],
  // C: 上が下を修飾
  ["急行", "きゅうこう", "C", "「急いで行く」→急が行を修飾。"],
  ["真夜", "まよ",      "C", "「真」が「夜」を修飾し「真の夜（夜中）」。"],
  ["重要", "じゅうよう", "C", "「重く要する」→重が要を修飾。"],
  ["快速", "かいそく",  "C", "「快い速さ」→快が速を修飾。"],
  ["高山", "こうざん",  "C", "「高い山」→高が山を修飾。"],
  ["新型", "しんがた",  "C", "「新しい型」→新が型を修飾。"],
  ["国立", "こくりつ",  "C", "「国が立てる（設立する）」→国が立を修飾。ただし主述と迷いやすい入試頻出語。"],
  ["毎朝", "まいあさ",  "C", "「毎」が「朝」を修飾し「毎回の朝」。"],
  ["洋風", "ようふう",  "C", "「洋の風（様式）」→洋が風を修飾。"],
  ["深海", "しんかい",  "C", "「深い海」→深が海を修飾。"],
  ["老木", "ろうぼく",  "C", "「老いた木」→老が木を修飾。"],

  // D: 下が上の目的語・対象（〜を・〜に）
  ["読書", "どくしょ",  "D", "「書を読む」→書が読むの目的語。"],
  ["登山", "とざん",    "D", "「山に登る」→山が登るの目的語。"],

  ["防火", "ぼうか",    "D", "「火を防ぐ」→火が防ぐの目的語。"],
  ["捕獲", "ほかく",    "D", "「獲物を捕る」→獲が捕るの目的語。"],
  ["作曲", "さっきょく","D", "「曲を作る」→曲が作るの目的語。"],
  ["就職", "しゅうしょく","D","「職に就く」→職が就くの目的語。"],

  ["日没", "にちぼつ",  "E", "「日が没する（沈む）」→日が主語。"],
  ["頭痛", "ずつう",    "E", "「頭が痛い」→頭が主語、痛が述語。"],
  ["雷鳴", "らいめい",  "E", "「雷が鳴る」→雷が主語。"],
  ["年長", "ねんちょう","E", "「年が長い（年上）」→年が主語。"],
  ["骨折", "こっせつ",  "E", "「骨が折れる」→骨が主語。"],
  ["国営", "こくえい",  "E", "「国が営む」→国が主語。"],
  ["地震", "じしん",    "E", "「地が震える」→地が主語。"],
  ["波及", "はきゅう",  "E", "「波が及ぶ」→波が主語。"],
  ["市営", "しえい",    "E", "「市が営む」→市が主語。"],
  ["人造", "じんぞう",  "E", "「人が造る」→人が主語。"],
  // F: 打ち消し（不・無・非・未）
  ["不安", "ふあん",    "F", "「安」を「不」で打ち消す。安心でない状態。"],
  ["無限", "むげん",    "F", "「限」を「無」で打ち消す。限りがないこと。"],
  ["非常", "ひじょう",  "F", "「常」を「非」で打ち消す。普通でない状態。"],
  ["未満", "みまん",    "F", "「満」を「未」で打ち消す。まだ満たない。"],
  ["不快", "ふかい",    "F", "「快」を「不」で打ち消す。気持ちよくない。"],
  ["無断", "むだん",    "F", "「断」を「無」で打ち消す。ことわりなく。"],
  ["非公開","ひこうかい","F", "「公開」を「非」で打ち消す。公開でない。"],
  ["未知", "みち",      "F", "「知」を「未」で打ち消す。まだ知られていない。"],
  ["不況", "ふきょう",  "F", "「況」を「不」で打ち消す。景気がよくない状態。"],
  ["無効", "むこう",    "F", "「効」を「無」で打ち消す。効力がない。"],
  ["非凡", "ひぼん",    "F", "「凡」を「非」で打ち消す。並外れてすぐれている。"],
  ["未来", "みらい",    "F", "「来」を「未」で打ち消す。まだ来ていない時。"],
  ["不毛", "ふもう",    "F", "「毛（作物）」を「不」で打ち消す。何も生まれない。"],
];

// 意味問題バンク（熟語、意味の正解、不正解3つ）
const PROBLEMS_MEANING = [
  ["捕獲", "ほかく", "生き物をつかまえること", ["逃がすこと","探し出すこと","調べること"]],
  ["克服", "こくふく", "困難に打ち勝つこと", ["あきらめること","逃げること","悩むこと"]],
  ["概略", "がいりゃく", "おおまかな内容", ["細かい説明","正確な数字","具体的な例"]],
  ["威厳", "いげん", "おかしがたい重々しい態度", ["親しみやすさ","かわいらしさ","はずかしさ"]],
  ["貢献", "こうけん", "力を尽くして役に立つこと", ["邪魔をすること","無視すること","批判すること"]],
  ["抵抗", "ていこう", "はむかったり逆らったりすること", ["従うこと","助けること","まねること"]],
  ["拡大", "かくだい", "広げて大きくすること", ["縮小すること","記録すること","集めること"]],
  ["模倣", "もほう", "まねること", ["作り出すこと","壊すこと","調べること"]],
  ["繁栄", "はんえい", "栄えてさかんになること", ["衰えること","静かになること","終わること"]],
  ["節約", "せつやく", "むだを省いて切り詰めること", ["使いきること","増やすこと","集めること"]],
  ["矛盾", "むじゅん", "つじつまが合わないこと", ["よくわかること","きれいに整うこと","正確なこと"]],
  ["欠乏", "けつぼう", "必要なものが不足すること", ["十分にあること","増えすぎること","余ること"]],
  ["勧告", "かんこく", "こうするよいとすすめること", ["禁止すること","調べること","無視すること"]],
  ["頑固", "がんこ", "自分の考えを変えないこと", ["すぐ変わること","弱いこと","正しいこと"]],
  ["優雅", "ゆうが", "上品でゆったりとしていること", ["はげしいこと","乱れていること","地味なこと"]],
  ["困惑", "こんわく", "どうしてよいかわからず迷うこと", ["喜ぶこと","安心すること","急ぐこと"]],
  ["献身", "けんしん", "自分を犠牲にして尽くすこと", ["自分勝手なこと","さぼること","逃げること"]],
  ["沈黙", "ちんもく", "だまっていること", ["大声を出すこと","動き回ること","笑うこと"]],
  ["浪費", "ろうひ", "むだに使うこと", ["大切にすること","貯めること","管理すること"]],
  ["謙虚", "けんきょ", "おごらず控えめなこと", ["自慢すること","強がること","怒ること"]],
];

function getProblems(diff) {
  if (diff === "kosei") {
    return PROBLEMS_STRUCTURE.map(([word, read, type, exp]) => ({
      qtype: "select", diff: "kosei",
      title: `組み立て：${word}`,
      question: `「${word}（${read}）」の組み立てはどれですか？`,
      options: Object.entries(TYPES).map(([k,v]) => v),
      answer: Object.keys(TYPES).indexOf(type),
      explanation: `【${TYPES[type]}】\n${exp}`,
      color: "#7c3aed",
    }));
  }
  if (diff === "imi") {
    return PROBLEMS_MEANING.map(([word, read, correct, wrongs]) => ({
      qtype: "select", diff: "imi",
      title: `意味：${word}`,
      question: `「${word}（${read}）」の意味はどれですか？`,
      options: shuffle([correct, ...wrongs]),
      answer: null, // 後でshuffleされた位置を使う
      _correct: correct,
      explanation: `「${word}」の意味：${correct}`,
      color: "#0369a1",
    }));
  }
  // mix
  return [...getProblems("kosei"), ...getProblems("imi")];
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pickProblems(diff, total) {
  const pool = getProblems(diff).map(p => {
    if(p._correct !== undefined) {
      const opts = shuffle([p._correct, ...PROBLEMS_MEANING.find(m=>m[0]===p.title.replace("意味：",""))?.[3] || []]);
      return { ...p, options: opts, answer: opts.indexOf(p._correct) };
    }
    return p;
  });
  const result = [];
  const used = new Set();
  while(result.length < total) {
    const idx = randInt(0, pool.length-1);
    if(!used.has(idx) || pool.length < total) {
      used.add(idx);
      result.push({...pool[idx]});
    }
  }
  return result;
}

// ─── SelectAnswer ─────────────────────────────────────────
function SelectAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="select-grid">
      {problem.options.map((opt, i) => {
        let cls = "select-btn";
        if (checked) {
          if (i === problem.answer) cls += " show-correct";
          else if (i === userAnswer) cls += " wrong";
          else cls += " disabled";
        }
        return (
          <button key={i} className={cls} onClick={() => !checked && onAnswer(i)}
            disabled={checked && i !== problem.answer && i !== userAnswer}>
            <span style={{color:"#6b7280",marginRight:"8px",fontWeight:"normal"}}>
              {"①②③④⑤⑥"[i]}
            </span>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────
function App() {
  const [mode, setMode]       = useState("setup");
  const [diff, setDiff]       = useState("mix");
  const [totalQ, setTotalQ]   = useState(10);
  const [problems, setProblems] = useState([]);
  const [current, setCurrent] = useState(0);
  const [score, setScore]     = useState(0);
  const [streak, setStreak]   = useState(0);
  const [best, setBest]       = useState(0);
  const [checked, setChecked] = useState(false);
  const [userAnswer, setUserAnswer] = useState(null);
  const [celeb, setCeleb]     = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);

  useEffect(() => {
    try { const s=localStorage.getItem(STORAGE_KEY); if(s) setBest(parseInt(s)||0); } catch(_) {}
  }, []);
  const saveBest = v => { try { localStorage.setItem(STORAGE_KEY, String(v)); } catch(_) {} };

  const startQuiz = () => {
    setProblems(pickProblems(diff, totalQ));
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setCeleb(false);
    setMode("quiz");
  };

  const problem = problems[current] || null;

  const handleAnswer = ans => {
    if (checked) return;
    setUserAnswer(ans); setChecked(true);
    const ok = ans === problem.answer;
    setIsCorrect(ok);
    if (ok) {
      setScore(s=>s+1); const ns=streak+1; setStreak(ns);
      if(ns>best){ setBest(ns); saveBest(ns); }
      setCeleb(true); setTimeout(()=>setCeleb(false), 1800);
    } else { setStreak(0); }
  };

  const nextQuestion = () => {
    if(current+1>=problems.length){ setMode("result"); return; }
    setCurrent(c=>c+1);
    setChecked(false); setUserAnswer(null); setCeleb(false);
  };

  const progress = problem ? (current/problems.length)*100 : 0;
  const BTN = "linear-gradient(135deg,#a855f7,#7c3aed)";

  if (mode === "setup") return (
    <div className="setup-wrap" style={{background:"#fdf2f8"}}>
      <div className="setup-card">
        <div className="setup-emoji">📖</div>
        <h1 className="setup-title" style={{color:"#581c87"}}>二字熟語 国語クイズ</h1>
        <p className="setup-sub">組み立て・意味（中学入試レベル）</p>
        {best>0&&<div className="best-badge" style={{background:"#f3e8ff",border:"1.5px solid #d8b4fe",color:"#581c87"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">分野を選ぶ</div>
        <div className="diff-btn-row">
          {[
            {key:"kosei", emoji:"🔧", name:"組み立て", desc:"似た意味・反対・修飾・目的語・主述・打ち消し"},
            {key:"imi",   emoji:"📚", name:"意味", desc:"熟語の意味を4択で選ぶ"},
            {key:"mix",   emoji:"⭐", name:"ミックス", desc:"組み立てと意味を混合出題"},
          ].map(d=>(
            <button key={d.key} className="diff-card-btn"
              style={{background:diff===d.key?"#f3e8ff":"#f9fafb",
                      border:diff===d.key?"2px solid #a855f7":"2px solid #e5e7eb",
                      boxShadow:diff===d.key?"0 3px 0 #a855f7":"none"}}
              onClick={()=>setDiff(d.key)}>
              <span style={{fontSize:"24px"}}>{d.emoji}</span>
              <div>
                <div className="diff-name" style={{color:diff===d.key?"#581c87":"#1f2937"}}>{d.name}</div>
                <div className="diff-desc">{d.desc}</div>
              </div>
              {diff===d.key&&<span style={{marginLeft:"auto",fontSize:"18px"}}>✅</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #a855f7":"2px solid #dee2e6",
                      background:totalQ===n?"#a855f7":"#f8f9fa",
                      color:totalQ===n?"#fff":"#495057",
                      boxShadow:totalQ===n?"0 3px 0 #7c3aed":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #581c87"}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );

  if (mode === "result") {
    const pct = Math.round((score/problems.length)*100);
    return (
      <div className="setup-wrap" style={{background:"#fdf2f8"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#581c87"}}>おわり！</h2>
          <p className="result-score">{problems.length}問中 <span className="result-big" style={{color:"#a855f7"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#f3e8ff"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #581c87"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
        </div>
      </div>
    );
  }

  if(!problem) return null;

  return (
    <div className="rika-root">
      {celeb && (
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#581c87"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#a855f7"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}

      {/* ヘッダー */}
      <div className="quiz-header">
        <button className="back-btn" onClick={()=>setMode("setup")}>← もどる</button>
        <span className="q-label">Q{current+1}<span className="q-total">/{problems.length}</span></span>
        <span className="streak-badge">🔥{streak}</span>
      </div>

      {/* プログレスバー */}
      <div className="progress-bar-bg">
        <div className="progress-fill" style={{background:problem.color, width:`${progress}%`}}/>
      </div>

      {/* 問題カード */}
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"8px",gap:"6px"}}>
          <span style={{fontWeight:"900",fontSize:"13px",color:problem.color}}>{problem.title}</span>
          <span className={`diff-badge ${problem.diff==="imi"?"diff-nyushi":"diff-shogaku"}`}>
            {problem.diff==="kosei"?"組み立て":problem.diff==="imi"?"意味":"ミックス"}
          </span>
        </div>
        <div className="problem-text" style={{fontSize:"16px",fontWeight:"bold",lineHeight:"1.7",marginBottom:"12px"}}>
          {problem.question}
        </div>
        <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>
      </div>

      {/* 解説 */}
      {checked && (
        <>
          <div style={{textAlign:"center",fontSize:"18px",fontWeight:"900",color:isCorrect?"#10b981":"#ef4444"}}>
            {isCorrect?"⭕ 正解！":"❌ 不正解"}
          </div>
          <div className="explanation-card">
            <div style={{fontWeight:"900",marginBottom:"4px",fontSize:"12px",color:"#92400e"}}>💡 解説</div>
            {problem.explanation.split("\n").map((line,i)=><div key={i}>{line}</div>)}
          </div>
          <button className="next-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #581c87"}} onClick={nextQuestion}>
            {current+1>=problems.length?"結果を見る 🎉":"つぎへ →"}
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
